  antidrift/no-sql-string-concat:
    status: ready
    stable: false
    referenceDoc: docs/rule-investigations/no-sql-string-concat.md
    signal: SQL keyword/context AST plus scope-binding guard control-flow plus TypeChecker imported-escaper proof
    solveType: injection-boundary
    corpusRepositories:
      [
        chaski,
        codebase-atlas,
        sudocode-main,
        cloudflare-agents,
        opencode,
        powersync-service,
      ]
    concerns:
      - The benchmark on 262 real files reports 12 antidrift findings and 0 `sonarjs/sql-queries` findings, so SonarJS is not a replacement for the current HogQL/template interpolation signal.
      - Dynamic placeholder lists such as `ids.map(() => "?").join(",")` are accepted clean because values remain bound parameters.
      - Locally built static SQL fragment arrays joined into SET/WHERE clauses are accepted clean; arbitrary dynamic SQL fragments still report.
      - Parameterized SQL template tags such as `sql`, `sqlQuery`, and `sqlRun` are accepted clean because the tag owns value binding.
      - Opencode Drizzle-style `sql` tags and `sql.identifier(...)` usage are accepted clean as ORM-owned SQL composition.
      - Closed SQL identifier fragments from typed service-boundary unions and static object-literal column maps are accepted only in SQL identifier/direction positions.
      - Dynamic object-key column lists and non-allowlisted table names are intentional drift findings.
      - Constructor-validated dynamic SQL identifiers are accepted only when an anchored identifier regex guard definitely exits on failure, the derived identifier template remains identifier-shaped, and interpolation is in an SQL identifier position.
      - Opencode stats local `sqlIdentifier` / `sqlString` quote-doubling helpers are accepted only when the helper body proves matching quote escaping; local SQL-fragment builders are accepted only for single-template bodies with unquoted identifier parameters and identifier-safe call-site arguments.
      - Finite static object fragments such as Opencode `dimensionSql.select` / `dimensionSql.groupBy` are accepted only when all returned object branches expose safe SQL fragment properties.
      - Current production drift evidence is Chaski plus PowerSync service. Sudocode and Cloudflare add useful but lower-strength drift pressure because the accepted findings are in test helpers and demo/playground code.
      - "PowerSync service supplies the guard/escaper lower edge: `sourceTable.table` still reports when a neighboring escaped table-name helper exists. The imported `escapeMysqlTableName(table)` call now stays clean through a TypeScript symbol-to-declaration proof of quote-doubled identifier escaping."
      - "The June 9, 2026 advisory review found the PowerSync imported-escaper proof sound and the rule locally ready, but not stable. Stable is blocked by broad SQL finding classification and by the type-aware-only imported-escaper branch silently degrading to conservative reports without parser services."
      - The widened ad hoc SQL scan still has 168 mostly unclassified findings; curated corpus gates are not enough to claim zero false positives.
      - SQL-looking payload text inside browser/test script templates is clean when the interpolation itself is not part of SQL syntax.
    external:
      state: partial-overlap
      support: medium
      candidates: ["sonarjs/sql-queries", "sql/no-unsafe-query"]
      decision: own-antidrift
      whyThisState: "Security plugins cover SQL construction in nearby ways, but the measured SonarJS benchmark did not report the real HogQL/template interpolation cases."
      whyNotOtherState: "Not equivalent because the real HoGQL interpolation case was not covered by the checked ecosystem path."
    examples:
      flags:
        - "const sql = `SELECT * FROM users WHERE id = ${id}`;"
        - 'const setClause = Object.keys(updates).map((field) => `${field} = ?`).join(", "); db.prepare(`UPDATE executions SET ${setClause} WHERE id = ?`);'
        - "setQuery(`SELECT * FROM ${tableName} LIMIT 10`);"
      allows:
        - 'db.query("SELECT * FROM users WHERE id = ?", [id]);'
        - 'const placeholders = ids.map(() => "?").join(","); db.prepare(`SELECT id FROM issues WHERE id IN (${placeholders})`).all(...ids);'
        - "await this.sqlRun`UPDATE files SET modified_at = ${timestamp} WHERE path = ${path}`;"
        - 'const sortBy = options.sortBy ?? "created_at"; db.prepare(`SELECT * FROM executions ORDER BY ${sortBy}`);'
        - 'if (!VALID_NAMESPACE.test(ns)) throw new Error("bad namespace"); this.tableName = `cf_workspace_${ns}`; this.sql.run(`SELECT * FROM ${this.tableName}`);'
        - 'const table = [catalog, database, name].map(sqlIdentifier).join("."); db.prepare(`SELECT * FROM ${table}`);'
        - 'await connectAndRun(`ws.send(JSON.stringify({ input: { query: "SELECT * FROM everything" }, output: "${hugeOutput}" }))`);'
    nextAction: Classify the broad SQL inventory and resolve or explicitly document the non-type-aware imported-escaper degradation before stable promotion.
