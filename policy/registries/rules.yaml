rules:
  antidrift/no-appeasement-cast:
    status: ready
    stable: false
    signal: TypeChecker
    solveType: type-escape-hatch
    proofBuckets: [semantic-source-type-provenance]
    referenceDoc: docs/rule-investigations/no-appeasement-cast.md
    corpusRepositories: [chaski, codebase-atlas, sudocode-main, opencode]
    concerns:
      - Broad inventory classified all current Chaski, Codebase Atlas, and Sudocode findings as real boundary/type-escape drift or in-scope test setup.
      - Copy-backed remediation evidence now covers caught-error guards, serialized browser storage validation, schema-backed object-contract checks, and third-party bag guards; do not add more copy-only remediation before the next promotion review.
      - Test-file casts remain in scope and should report, but test-only findings do not count as production drift evidence for stable promotion.
      - The rule has no explicit SDK/API allowlist; typed conversions stay clean only when the source is not any or unknown.
      - The upstream @typescript-eslint/no-unsafe-type-assertion benchmark checked 2,411 real files and reported every antidrift cast-family location, but also produced 1,331 upstream-only locations; keep upstream as an optional strict benchmark rather than the default replacement.
      - Cloudflare Agents has production WebSocket JSON parse-output contract assertions in packages/ai-chat/src/ws-chat-transport.ts, but that external checkout cannot currently resolve agents/tsconfig for type-aware evaluation.
    external:
      state: broader-upstream
      support: high
      candidates: ["@typescript-eslint/no-unsafe-type-assertion"]
      decision: own-antidrift
      whyThisState: "The upstream rule catches some appeasement casts, but it covers a much broader assertion policy than this rule."
      whyNotOtherState: "Not equivalent because Chaski clean controls include SDK/API conversion casts that the upstream rule also reports."
    examples:
      flags:
        - "const err = caught as AxiosError;"
      allows:
        - "if (axios.isAxiosError(caught)) return caught.response?.status;"
    nextAction: Stop copy-only remediation for this phase; next promotion work should rerun broad inventory after real consumer cleanup or move to the next validation-boundary rule.
  antidrift/no-async-array-method:
    status: ready
    stable: false
    signal: AST
    solveType: promise-control-flow
    proofBuckets: [local-ast-source-shape, semantic-source-type-provenance]
    referenceDoc: docs/rule-investigations/no-async-array-method.md
    corpusRepositories: [chaski, codebase-atlas, sudocode-main]
    concerns:
      - Broad local inventory found no false positives across Chaski and Codebase Atlas, but real drift still replicates only in Sudocode test cleanup code.
      - Keep stable false until a second independent real drift is found or the project explicitly accepts one-repo drift evidence for this deterministic AST rule.
      - The never-await method branch and map/flatMap not-collected branch have different proof burdens and may need separate promotion gates.
    external:
      state: partial-overlap
      support: high
      candidates:
        [
          "@typescript-eslint/no-misused-promises",
          "@typescript-eslint/no-floating-promises",
        ]
      decision: own-antidrift
      whyThisState: "The ecosystem pair can catch async callbacks in some array APIs when broad void-return checks are enabled."
      whyNotOtherState: "Not equivalent because the needed option also reports real Express-style handlers, while the custom rule stays on array-method misuse."
    examples:
      flags:
        - "items.forEach(async (item) => await save(item));"
      allows:
        - "for (const item of items) await save(item);"
        - "await Promise.all(items.map(async (item) => save(item)));"
    nextAction: "Decide branch-specific promotion: never-await methods may be stable on deterministic evidence while map/flatMap not-collected keeps a separate dataflow evidence gate."
  antidrift/no-handrolled-resource-lifecycle-cells:
    status: under-proven
    stable: false
    signal: source binding plus local transition/control-flow proof
    solveType: react-state-shape
    proofBuckets: [semantic-source-type-provenance]
    referenceDoc: docs/rule-roadmap.md
    corpusRepositories: [chaski, sudocode-main, cloudflare-agents, murderbox]
    concerns:
      - "After the lifecycle proof rewrite, local fixed-proof scans checked 3,323 files across Chaski, Sudocode, Murderbox, Codebase Atlas, Opencode UI/console, Cloudflare Agents, and PowerSync; they classified 230 broad co-mutation inventory facts and emitted 9 resourceLifecycleProof diagnostics across Chaski, Sudocode, and Cloudflare Agents."
      - "Pinned drift anchors include Chaski reporting screens, Sudocode execution handlers, and Cloudflare examples; pinned clean controls include Murderbox auth-form submit state plus Chaski synchronous/view-state controls."
      - Broad co-mutation is inventory only; blocking requires a transition that toggles a boolean lifecycle cell, writes a distinct error cell inside catch, and assigns a distinct payload cell from an awaited value or first-level awaited source member.
      - The status-triplet derivability branch belongs here as a redundant-constant-cell proof instead of remaining a standalone name-group rule.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported React rule was found that models multiple local state setters as one state-machine smell."
      whyNotOtherState: "Not partial-overlap because generic hooks rules do not reason about coupled setter bindings in one handler."
    examples:
      flags:
        - "onClick={() => { setData(data); setLoading(false); setError(null); }}"
      allows:
        - "setDataOne(left); setDataTwo(right);"
        - 'dispatch({ type: "loaded", data });'
    nextAction: Human-review the multi-repo positives, add/remediate clean controls where review finds ordinary form or mutation state, and keep the default-off rule under-proven until promotion has zero known false positives.
  antidrift/no-shattered-ingested-entity-state:
    status: under-proven
    stable: false
    signal: source binding plus local transition/source-member provenance
    solveType: react-state-shape
    proofBuckets: [semantic-source-type-provenance]
    referenceDoc: docs/rule-investigations/no-shattered-ingested-entity-state.md
    corpusRepositories: [chaski]
    concerns:
      - This rule is inventory-only — it records behavioral source-member fan-out as `sourceMemberStateShardCandidate` and never reports a diagnostic.
      - The owned-entity enforcement tier was removed after multi-repo scans (chaski, sudocode) found zero real human-authored owned-entity shatters; every behavioral hit was a response envelope, value object, or computed result, which the rule correctly leaves alone.
      - Editable draft fields stay clean when cells are controlled by input value/checked props and event-derived setters.
      - Re-promotion to enforcement requires several real human-authored owned-entity shatters across more than one repo (likely an agent-generated corpus), plus pagination/query-metadata/envelope/denormalized-view-state clean controls.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No maintained React rule was found that models one fetched entity object being split into sibling state cells by source-member provenance."
      whyNotOtherState: "Not partial-overlap because Hooks and React rules reason about hook legality, dependencies, and derivation, not setter-to-source-member cohesion."
    examples:
      flags:
        - "const user = await fetchUser(); setId(user.id); setName(user.name);"
      allows:
        - "const user = await fetchUser(); setUser(user);"
        - "<input value={name} onChange={(event) => setName(event.currentTarget.value)} />"
    nextAction: Mine an agent-generated corpus (plus additional real React repos) for genuine owned-entity shatters; only with several cross-repo positives and envelope/pagination/view-state clean controls should the enforcement tier be rebuilt. Until then this stays inventory-only.
  antidrift/no-defensive-shape-probing:
    status: under-proven
    stable: false
    signal: TypeChecker plus AST shape
    solveType: broad-value-shape-probing
    proofBuckets: [semantic-source-type-provenance]
    referenceDoc: docs/rule-investigations/no-defensive-shape-probing.md
    corpusRepositories: [chaski, sudocode-main, codebase-atlas, opencode]
    concerns:
      - Object.entries extractor branch has real Chaski drift evidence.
      - Boolean predicate helper branch was removed and remains separate research.
      - The rule now requires the entries value binding to be any/unknown before shape-probe counting matters.
      - Benchmarking shows the current any-typed Chaski drift is also reported by @typescript-eslint unsafe member-access rules on the individual property reads, while antidrift reports one callback-level architectural finding.
      - "pnpm policy:inventory-defensive-shape now makes the sunset sweep reproducible: 1,648 type-aware files, 72 Object.entries transform syntax candidates, 1 custom finding, 0 parser errors, and 1 drift repository."
      - Stable promotion remains blocked; the reproducible sweep found no second drift repository and the one Chaski finding has same-file upstream unsafe-rule overlap.
      - Claude Opus 4.8 advisory review recommends demoting to inventory/off or retiring if no second drift appears beyond upstream unsafe-member coverage.
    external:
      state: partial-overlap
      support: medium
      candidates:
        - "@typescript-eslint/no-unsafe-member-access"
        - "@typescript-eslint/no-unsafe-return"
        - "@typescript-eslint/no-unsafe-assignment"
      decision: own-antidrift
      whyThisState: "TypeScript ESLint unsafe rules catch many any-leak symptoms, including the current Chaski member-access reads, but they do not group Object.entries mini-parsers or point to owned schema/converter construction."
      whyNotOtherState: "Not ecosystem-covered because the custom rule's value is the callback-level normalization smell and replacement path; not net-antidrift because the current any-typed drift has upstream unsafe-rule overlap."
    examples:
      flags:
        - 'Object.entries(raw as Record<string, unknown>).map(([, value]) => "numberValue" in value ? value.numberValue : null)'
      allows:
        - "const parsed = schema.parse(raw);"
        - "Object.entries(typedMap).map(([id, value]) => value.name)"
    nextAction: Keep as explicit default-off package inventory after the parser-clean sunset sweep; do not promote unless a second real drift repository appears, preferably with unknown-typed broad values not already explained by upstream unsafe-member rules.
  antidrift/no-hover-translate-card:
    status: ready
    stable: false
    signal: AST string literal extraction
    solveType: design-system-interaction
    proofBuckets: [local-ast-source-shape]
    referenceDoc: docs/rule-roadmap.md
    corpusRepositories: [chaski, sudocode-main]
    concerns:
      - CSS @apply remains outside current JSX scope.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "A generated selector could ban hover translate tokens, but the custom extractor handles static class expressions more clearly."
      whyNotOtherState: "Not ecosystem-covered because the desired policy is design-system interaction guidance, not generic Tailwind validity."
    examples:
      flags:
        - 'className="card hover:-translate-y-0.5"'
      allows:
        - 'className="card hover:shadow-md"'
    nextAction: Stable promotion requires inventory classification across another UI repo.
  antidrift/no-inline-structural-type-at-use-site:
    status: ready
    stable: false
    signal: AST
    solveType: type-contract-shape
    proofBuckets: [local-ast-source-shape]
    referenceDoc: docs/rule-roadmap.md
    corpusRepositories: [chaski, sudocode-main]
    concerns:
      - Local UI props and callback payloads require careful exclusions.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "Core selectors can find inline type literals, but the custom rule narrows the violation to exported and boundary use sites."
      whyNotOtherState: "Not equivalent because a raw syntax ban would report legitimate local props, callbacks, and small internal shapes."
    examples:
      flags:
        - "export function load(input: { userId: string }) {}"
      allows:
        - "export function load(input: LoadInput) {}"
    nextAction: Seek independent repo replication before stable promotion.
  antidrift/no-nullable-positional-tuple:
    status: ready
    stable: false
    signal: deterministic AST
    solveType: type-contract-shape
    proofBuckets: [local-ast-source-shape, semantic-source-type-provenance]
    referenceDoc: docs/rule-investigations/no-nullable-positional-tuple.md
    corpusRepositories: [chaski]
    concerns:
      - The rule intentionally requires at least two nullable or optional tuple slots; one nullable slot in a hook-style tuple stays clean.
      - Type alias and generic-chain nullability are resolved only when TypeScript parser services are available.
      - Imported owner aliases such as date-picker range types stay outside the rule unless they are redeclared as local tuple syntax.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported rule was found for the narrower smell of positional tuples with multiple nullable or optional slots."
      whyNotOtherState: "Not equivalent to tuple bans because ordinary coordinate or hook-style tuples should remain clean."
    examples:
      flags:
        - "type CustomRange = [Date | null, Date | null];"
      allows:
        - "type Point = [number, number];"
    nextAction: Seek another real nullable positional tuple and clean tuple-control replication before stable promotion.
  antidrift/no-raw-fetch-in-component:
    status: ready
    stable: true
    signal: import-scope plus AST
    solveType: side-effect-boundary
    promotion:
      proofBucket: local-ast-source-shape
      association: Component-scope function frames to direct fetch, globalThis.fetch, window.fetch, or self.fetch calls.
      blockingThreshold: Any raw fetch call inside a component frame reports; raw fetch in non-component helpers stays clean.
      ecosystemComparison: Generated no-restricted-syntax selectors can ban fetch in broad globs, but do not prove component-boundary context.
      corpusEvidence: Chaski, Codebase Atlas, Sudocode, and Murderbox provide drift and clean component/helper controls for the fetch-specific boundary.
      realCorpusInventory: docs/rule-investigations/no-raw-fetch-in-component.md and docs/stable-promotion-inventory.md record multi-repo drift and clean controls from Chaski, Codebase Atlas, Sudocode, Murderbox, and Taskme.
      realCorpusInventoryRefs:
        - docs/rule-investigations/no-raw-fetch-in-component.md
        - docs/stable-promotion-inventory.md
      claudeAdvisoryReview: docs/rule-investigations/no-raw-fetch-in-component.md records grounded advisory review with no promotion blockers.
      claudeAdvisoryReviewRefs:
        - docs/rule-investigations/no-raw-fetch-in-component.md
      replicationsNotIntroducedForTest: true
      knownFalsePositives: 0
      knownFalseNegatives: 0
      productionConcerns: none
      noSinkBehavior: This rule emits no semantic facts; diagnostics do not depend on an optional fact sink.
      noDeadWorkBehavior: Helper-level fetches and hook/query abstractions stay clean, so the rule does not force wrapping already-owned data access.
    referenceDoc: docs/rule-investigations/no-raw-fetch-in-component.md
    corpusRepositories: [chaski, codebase-atlas, sudocode-main, murderbox]
    concerns:
      - Scope decision resolved on June 4, 2026; keep this rule fetch-specific and put broader raw transport ownership in a separate registry-backed rule if real non-fetch drift justifies it.
      - The rule models fetch, globalThis.fetch, window.fetch, and self.fetch. Aliased or destructured fetch is out of scope until real corpus evidence appears.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "A generated selector could ban fetch in broad file globs, but this rule narrows to component context."
      whyNotOtherState: "Not ecosystem-covered because the replacement would lose the component-boundary ambition and produce cruder reports."
    examples:
      flags:
        - 'function Orders() { fetch("/api/orders"); return null; }'
        - "async function loadImage(url) { return globalThis.fetch(url); }"
      allows:
        - 'async function loadOrders() { return fetch("/api/orders"); }'
        - "function Orders() { const { data } = useOrders(); return <div>{data.length}</div>; }"
    nextAction: Stable; monitor for real aliased/destructured fetch evidence and keep broader raw transport as a separate future rule.
  antidrift/no-raw-tailwind-color:
    status: ready
    stable: false
    signal: class-string
    solveType: design-token-drift
    proofBuckets: [local-ast-source-shape]
    referenceDoc: docs/rule-roadmap.md
    corpusRepositories: [chaski]
    concerns:
      - Broad Chaski inventory has many findings and may need cleanup before wide enforcement.
      - Current raw-color regex is a source-scanning sampler unless it is tied to the project's actual token surface.
      - Theme/design-system constraints may be a stronger primary control than lint for making raw utilities unconstructable.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "Generated selectors could ban raw class tokens, but the custom extractor is clearer for JSX class expressions."
      whyNotOtherState: "Not equivalent to Tailwind correctness plugins because the policy is semantic token ownership, not valid utility syntax."
    examples:
      flags:
        - 'className="text-red-500"'
      allows:
        - 'className="text-danger"'
    nextAction: Decide lint-vs-theme control layer; if lint stays, classify inventory findings and make token coverage explicit.
  antidrift/no-redundant-zod-parse:
    status: ready
    stable: true
    referenceDoc: docs/rule-investigations/no-redundant-zod-parse.md
    signal: TypeChecker plus schema provenance
    solveType: validation-boundary-drift
    promotion:
      proofBucket: semantic-source-type-provenance
      association: Values already proven as a Zod schema output to later parse calls on the same schema.
      blockingThreshold: Same-schema reparse reports only when TypeScript proves the consumed value is already equivalent to that schema output.
      ecosystemComparison: Generic unsafe-assignment or Zod style rules do not track same-schema provenance from parsed values.
      corpusEvidence: Chaski, Codebase Atlas, and Murderbox provide same-schema drift plus first-boundary parse and test-contract clean controls.
      realCorpusInventory: docs/rule-investigations/no-redundant-zod-parse.md and docs/stable-promotion-inventory.md record Chaski and Murderbox drift plus clean first-boundary and assertion-contract controls.
      realCorpusInventoryRefs:
        - docs/rule-investigations/no-redundant-zod-parse.md
        - docs/stable-promotion-inventory.md
      claudeAdvisoryReview: reports/claude-rule-review-no-redundant-zod-parse-20260604-170153.md and docs/rule-investigations/no-redundant-zod-parse.md record the advisory review and accepted corpus edge.
      claudeAdvisoryReviewRefs:
        - reports/claude-rule-review-no-redundant-zod-parse-20260604-170153.md
        - docs/rule-investigations/no-redundant-zod-parse.md
      replicationsNotIntroducedForTest: true
      knownFalsePositives: 0
      knownFalseNegatives: 0
      productionConcerns: none
      noSinkBehavior: This rule emits no semantic facts; diagnostics depend on parser services and local provenance, not sink availability.
      noDeadWorkBehavior: First boundary parses, different storage schemas, and assertion-callback contract checks stay clean.
    corpusRepositories: [chaski, codebase-atlas, murderbox]
    concerns:
      - "Test assertion scope is decided: Zod parses inside throw assertion callbacks are schema-contract checks, not validation-boundary drift."
      - "A June 4, 2026 real-test scan found no consumed assertion-callback reparse case across Codebase Atlas, Murderbox, Sudocode, and Chaski; that missing negative gate is accepted as unrepresented in the current corpus."
      - "Direct inline awaited and synchronous helper-result reparses are covered when TypeScript proves the helper result is equivalent to the schema output."
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported Zod rule was found that tracks schema provenance and reports re-parsing a value already produced by the same schema."
      whyNotOtherState: "Not partial-overlap because generic unsafe-assignment rules do not distinguish raw input from schema-owned output."
    examples:
      flags:
        - "const row = RowSchema.parse(await getTypedRow());"
      allows:
        - "const row = RowSchema.parse(raw);"
        - "expect(() => RowSchema.parse(typedFixture)).not.toThrow();"
    nextAction: Stable; monitor for first-boundary schema pipelines that need additional clean exclusions.
  antidrift/no-sql-string-concat:
    status: ready
    stable: true
    referenceDoc: docs/rule-investigations/no-sql-string-concat.md
    signal: SQL keyword/context AST plus scope-binding guard control-flow plus TypeChecker imported-escaper and configured safe-identifier-member proof
    solveType: injection-boundary
    promotion:
      proofBucket: semantic-source-type-provenance
      association: SQL string fragments to bound values, identifier allowlists, escaping helpers, safe members, or unsafe interpolation.
      blockingThreshold: Unsafe value interpolation in SQL context reports; identifier interpolation reports only when the checker cannot prove a bound, allowlisted, escaped, static, or configured-safe source.
      ecosystemComparison: SonarJS and SQL plugins cover nearby SQL construction, but measured benchmarks missed the real HogQL/template interpolation and identifier-proof surface.
      corpusEvidence: The source-fleet SQL inventory checked 1,375 SQL-candidate files across 24 repos with 31 custom findings, 0 SonarJS findings, 0 parser errors, and no known type-aware false positives.
      realCorpusInventory: docs/rule-investigations/no-sql-string-concat.md, reports/sql-query-benchmark.json, and reports/sql-broad-inventory-source-fleet.json record production drift, clean controls, and source-fleet coverage.
      realCorpusInventoryRefs:
        - docs/rule-investigations/no-sql-string-concat.md
        - reports/sql-query-benchmark.json
        - reports/sql-broad-inventory-source-fleet.json
      claudeAdvisoryReview: reports/claude-rule-review-no-sql-string-concat-20260609-0803-rerun.md and docs/rule-investigations/no-sql-string-concat.md record advisory review and the closed parser-service blocker.
      claudeAdvisoryReviewRefs:
        - reports/claude-rule-review-no-sql-string-concat-20260609-0803-rerun.md
        - docs/rule-investigations/no-sql-string-concat.md
      replicationsNotIntroducedForTest: true
      knownFalsePositives: 0
      knownFalseNegatives: 0
      productionConcerns: none
      noSinkBehavior: This rule emits no semantic facts; benchmark and inventory tooling read diagnostics and parser-service deltas directly.
      noDeadWorkBehavior: Parameterized tags, placeholder lists, static fragments, typed unions, regex exit guards, and quote-doubling escapers stay clean.
    corpusRepositories:
      [
        chaski,
        codebase-atlas,
        sudocode-main,
        cloudflare-agents,
        opencode,
        powersync-service,
      ]
    proven:
      - "Production drift evidence exists in Chaski HogQL/template interpolation and PowerSync service raw `sourceTable.table` interpolation."
      - "Bound-value SQL stays clean for positional placeholder lists, parameterized `sql`/`sqlQuery`/`sqlRun` tags, ORM-owned SQL composition, and numbered Postgres placeholder fragments that interpolate only index plus/multiply arithmetic after `$` while values remain in bound params."
      - "Static SQL fragments stay clean for literal fragment arrays, finite static object fragment maps, and static condition fragments joined into SET/WHERE shapes."
      - "Closed SQL identifiers stay clean when proven by typed service-boundary unions, static object-literal column maps, anchored regex guards that definitely exit on failure, local quote-doubling escapers, imported quote-doubling escapers, or configured safe identifier members with parser services."
      - "Dynamic object-key column lists and non-allowlisted table names are intentional drift findings."
      - "The source-fleet inventory checked 1,375 SQL-candidate files across 24 primary repositories with 31 custom findings, 0 SonarJS findings, 0 parser errors, and no known type-aware false positives after the numbered-placeholder and Figma payload fixes."
      - "The June 9 adversarial cleanup restored short-circuit safety checks and keeps numbered-placeholder proof limited to the real observed plus/multiply arithmetic shape; subtraction and arbitrary arithmetic are not accepted."
    concerns:
      - The benchmark on 338 real files reports 16 antidrift findings and 0 `sonarjs/sql-queries` findings, so SonarJS is not a replacement for the current HogQL/template interpolation signal.
      - Dynamic placeholder lists such as `ids.map(() => "?").join(",")`, and numbered Postgres placeholder fragments that interpolate only index plus/multiply arithmetic after `$`, are accepted clean because values remain bound parameters.
      - Locally built static SQL fragment arrays joined into SET/WHERE clauses are accepted clean; arbitrary dynamic SQL fragments still report.
      - Parameterized SQL template tags such as `sql`, `sqlQuery`, and `sqlRun` are accepted clean because the tag owns value binding.
      - Opencode Drizzle-style `sql` tags and `sql.identifier(...)` usage are accepted clean as ORM-owned SQL composition.
      - Closed SQL identifier fragments from typed service-boundary unions and static object-literal column maps are accepted only in SQL identifier/direction positions.
      - Dynamic object-key column lists and non-allowlisted table names are intentional drift findings.
      - Constructor-validated dynamic SQL identifiers are accepted only when an anchored identifier regex guard definitely exits on failure, the derived identifier template remains identifier-shaped, and interpolation is in an SQL identifier position.
      - Opencode stats local `sqlIdentifier` / `sqlString` quote-doubling helpers are accepted only when the helper body proves matching quote escaping; local SQL-fragment builders are accepted only for single-template bodies with unquoted identifier parameters and identifier-safe call-site arguments.
      - Finite static object fragments such as Opencode `dimensionSql.select` / `dimensionSql.groupBy` are accepted only when all returned object branches expose safe SQL fragment properties.
      - Current stable production drift evidence is Chaski plus PowerSync service. Sudocode, Cloudflare, and PowerSync tests add useful but lower-strength pressure because those findings are in test helpers, demo/playground code, or integration tests.
      - "PowerSync service supplies the guard/escaper lower edge: `sourceTable.table` still reports when a neighboring escaped table-name helper exists. The imported `escapeMysqlTableName(table)` call stays clean through a TypeScript symbol-to-declaration proof of quote-doubled identifier escaping, Postgres `SourceTable.escapedIdentifier` stays clean only through an explicit type/member contract that requires parser services to prove the receiver type, and numbered Postgres placeholder fragments stay clean through local structure."
      - "The June 9, 2026 advisory review found the PowerSync imported-escaper proof sound and the rule locally ready, but not stable until parser-service policy was decided. That policy is now codified: extra-only non-type-aware identifier reports are conservative inventory, while missing non-type-aware findings or parser errors block promotion."
      - The source-fleet SQL inventory across 24 primary repos is now classified with zero known type-aware false positives after the numbered-placeholder and Figma payload fixes. Worktrees, remediation copies, baseline copies, scratch folders, `.sst`, and `.open-next` artifacts do not count as promotion evidence.
      - "The SQL benchmark now inventories promotion boundaries: 202 SQL tagged-template uses are all in the currently allowed `sql`/`sqlQuery`/`sqlRun` shape, while Prisma `$queryRaw`, Kysely, Slonik, and aliased Drizzle tags still need real-code inventory before widening the allowlist."
      - Equivalent positive guard, allowlist, and regex-variant identifier sanitizers remain monitored expansion boundaries; the current benchmark finds the supported negative regex/exit shape plus one quantifier branch that stays clean.
      - The current concatenation branch does not cover SQL-builder `+=`; the benchmark sees 37 static builder appends and 8 dynamic builder append candidates. The dynamic candidates are currently classified clean, so do not widen builder-append linting until a real unsafe dynamic append appears.
      - The widened sentence-pattern trigger catches long unsafe Chaski templates at lines 626, 650, 1111, and 1367 that the old 200-character `SELECT ... FROM` window missed, while Cloudflare and Opencode SQL controls stay clean.
      - "The benchmark directly measures the non-type-aware boundary through `parserServiceDeltas`: without parser services, PowerSync `modules/module-mysql/src/replication/BinLogStream.ts:311`, `modules/module-postgres/src/replication/replication-utils.ts:290`, and `modules/module-postgres/src/replication/WalStream.ts:437` become conservative reports, with zero missing non-type-aware findings."
      - "The reproducible source-fleet SQL inventory command checked 1,375 SQL-candidate files across 24 primary repos with 31 custom findings and 0 SonarJS findings; the run is classified as 1 production drift, 3 parser-services-only conservative reports, 27 lower-strength demo/test drift findings, and 0 known type-aware false positives."
      - SQL-looking payload text inside browser/test script templates is clean when the interpolation itself is not part of SQL syntax.
      - Figma JavaScript payload strings are clean when words like "select" and "from" appear outside SQL syntax; operator-position interpolation now requires nearby SQL statement context.
    external:
      state: partial-overlap
      support: medium
      candidates: ["sonarjs/sql-queries", "sql/no-unsafe-query"]
      decision: own-antidrift
      whyThisState: "Security plugins cover SQL construction in nearby ways, but the measured SonarJS benchmark did not report the real HogQL/template interpolation cases."
      whyNotOtherState: "Not equivalent because the real HoGQL interpolation case was not covered by the checked ecosystem path."
    examples:
      flags:
        - "const sql = `SELECT * FROM users WHERE id = ${id}`;"
        - 'const setClause = Object.keys(updates).map((field) => `${field} = ?`).join(", "); db.prepare(`UPDATE executions SET ${setClause} WHERE id = ?`);'
        - "setQuery(`SELECT * FROM ${tableName} LIMIT 10`);"
      allows:
        - 'db.query("SELECT * FROM users WHERE id = ?", [id]);'
        - 'const placeholders = ids.map(() => "?").join(","); db.prepare(`SELECT id FROM issues WHERE id IN (${placeholders})`).all(...ids);'
        - "await this.sqlRun`UPDATE files SET modified_at = ${timestamp} WHERE path = ${path}`;"
        - 'const sortBy = options.sortBy ?? "created_at"; db.prepare(`SELECT * FROM executions ORDER BY ${sortBy}`);'
        - 'if (!VALID_NAMESPACE.test(ns)) throw new Error("bad namespace"); this.tableName = `cf_workspace_${ns}`; this.sql.run(`SELECT * FROM ${this.tableName}`);'
        - 'const table = [catalog, database, name].map(sqlIdentifier).join("."); db.prepare(`SELECT * FROM ${table}`);'
        - 'await connectAndRun(`ws.send(JSON.stringify({ input: { query: "SELECT * FROM everything" }, output: "${hugeOutput}" }))`);'
    nextAction: Stable; keep benchmark-sql-queries and inventory-sql-source-fleet as regression gates before widening SQL tag, guard, placeholder arithmetic, or builder-append coverage.
