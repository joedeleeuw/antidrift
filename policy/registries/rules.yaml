    referenceDoc: docs/rule-investigations/no-cycle.md
  antidrift/no-inline-disable-without-ticket:
    status: retired
    reason: Replaced by maintained ESLint directive description coverage through @eslint-community/eslint-comments/require-description plus @typescript-eslint/ban-ts-comment for TypeScript directives.
  antidrift/no-sdk-direct-use:
    status: retired
    reason: Replaced by generated ESLint core no-restricted-imports rules with wrapper-file overrides from policy/registries/gateways.yaml.
  antidrift/no-explicit-return-type-private-helper:
    status: retired
    reason: Real Chaski code showed explicit private helper return types are often legitimate contracts.
  antidrift/no-silent-catch:
    status: retired
    reason: Retired after utility review; ESLint no-empty, no-console, and SonarJS catch rules cover enough of the low-value surface, while the remaining console-only/comment-only custom behavior did not justify ownership.
  antidrift/no-thin-typed-factory-wrapper:
    status: retired
    reason: Read-only corpus review found no real non-test exact-forward internal drift, while broad typed-constructor wrappers and exported facades are clean controls with high false-positive risk.
    referenceDoc: docs/rule-investigations/no-thin-typed-factory-wrapper.md

