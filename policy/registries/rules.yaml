decisionLocks:
  antidrift/no-cycle:
    status: retired
    location: retiredRules
    replacement: import-x/no-cycle
    reason: Maintained import-graph coverage owns cycle detection; do not rebuild custom graph traversal without changing the checker lock.
  antidrift/no-inline-disable-without-ticket:
    status: retired
    location: retiredRules
    replacement: "@eslint-community/eslint-comments/require-description plus @typescript-eslint/ban-ts-comment"
    reason: Maintained directive-description rules own local disable justification; do not revive ticket-string matching.
  antidrift/no-sdk-direct-use:
    status: retired
    location: retiredRules
    replacement: generated no-restricted-imports from policy/registries/gateways.yaml
    reason: Core ESLint restrictions plus gateway registry facts own direct SDK import blocking.
  antidrift/no-explicit-return-type-private-helper:
    status: retired
    location: retiredRules
    replacement: none
    reason: Real corpus review showed private helper return annotations are often legitimate contracts, not deterministic appeasement.
  antidrift/no-silent-catch:
    status: retired
    location: retiredRules
    replacement: "ESLint no-empty, no-console, sonarjs/no-ignored-exceptions, preserve-caught-error"
    reason: Maintained rules cover enough low-value catch handling; future custom error work should target fallback-to-empty.
  antidrift/no-thin-typed-factory-wrapper:
    status: retired
    location: retiredRules
