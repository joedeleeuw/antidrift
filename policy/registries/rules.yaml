schemaVersion: 1

promotionRequirements:
  investigation:
    requireReferenceDoc: true
    requireEcosystemCheck: true
    requireClaudeAdvisoryKickoff: true
    notes:
      - Investigation starts with evidence capture, not code.
      - The rule table should point to a reference document for candidate scope, ecosystem coverage, potential solves, and remaining gaps.
      - If an existing ESLint or typescript-eslint rule covers the behavior, mark the candidate ecosystem-covered instead of implementing a custom rule.
  stable:
    minIndependentRepositories: 2
    requireReplicationsNotIntroducedForTest: true
    maxKnownFalsePositives: 0
    maxKnownFalseNegatives: 0
    productionConcerns: none
    requireClaudeAdvisoryReview: true
    requireRealCorpusInventory: true
    notes:
      - Stable promotion is stricter than local readiness.
      - Fixture programs and code added only to satisfy a rule do not count as replications.
      - Claude review is advisory only; repo evidence and validation gates remain authoritative.

claudeAdvisory:
  model: claude-opus-4-8
  promptProtocol: docs/claude-rule-review-protocol.md
  mode: read-only
  outputDirectory: reports

statuses:
  ready: Implemented, enabled, and backed by at least one real drift and clean assertion under the current local gate.
  under-proven: Implemented, but missing enough real drift or clean evidence to trust promotion.
  false-positive-prone: Implemented, but real corpus evidence or review found an overbroad branch or unstable signal.
  ecosystem-covered: Existing ecosystem rule or plugin covers the behavior well enough; do not implement a custom antidrift rule unless a real gap remains.
  retired: Removed from the active rule surface because real code showed the signal was not deterministic enough.
  research: Not implemented; requires ecosystem review and real corpus evidence before entering scope.

rules:
  antidrift/no-appeasement-cast:
    status: ready
    stable: false
    signal: TypeChecker
    solveType: type-escape-hatch
    referenceDoc: docs/rule-investigations/no-appeasement-cast.md
    corpusRepositories: [chaski, codebase-atlas, sudocode-main]
    concerns:
      - Broad inventory classified all current Chaski, Codebase Atlas, and Sudocode findings as real boundary/type-escape drift or in-scope test setup.
      - Copy-backed remediation evidence now covers caught-error guards, serialized browser storage validation, schema-backed object-contract checks, and third-party bag guards; do not add more copy-only remediation before the next promotion review.
      - Test-file casts remain in scope and should report, but test-only findings do not count as production drift evidence for stable promotion.
      - The rule has no explicit SDK/API allowlist; typed conversions stay clean only when the source is not any or unknown.
      - The upstream @typescript-eslint/no-unsafe-type-assertion benchmark checked 2,411 real files and reported every antidrift cast-family location, but also produced 1,331 upstream-only locations; keep upstream as an optional strict benchmark rather than the default replacement.
    external:
      state: broader-upstream
      support: high
      candidates: ["@typescript-eslint/no-unsafe-type-assertion"]
      decision: own-antidrift
      whyThisState: "The upstream rule catches some appeasement casts, but it covers a much broader assertion policy than this rule."
      whyNotOtherState: "Not equivalent because Chaski clean controls include SDK/API conversion casts that the upstream rule also reports."
    examples:
      flags:
        - "const err = caught as AxiosError;"
      allows:
        - "if (axios.isAxiosError(caught)) return caught.response?.status;"
    nextAction: Stop copy-only remediation for this phase; next promotion work should rerun broad inventory after real consumer cleanup or move to the next validation-boundary rule.
  antidrift/no-async-array-method:
    status: ready
    stable: false
    signal: AST
    solveType: promise-control-flow
    referenceDoc: docs/rule-investigations/no-async-array-method.md
    corpusRepositories: [chaski, codebase-atlas, sudocode-main]
    concerns:
      - Broad local inventory found no false positives across Chaski and Codebase Atlas, but real drift still replicates only in Sudocode test cleanup code.
      - Keep stable false until a second independent real drift is found or the project explicitly accepts one-repo drift evidence for this deterministic AST rule.
    external:
      state: partial-overlap
      support: high
      candidates:
        [
          "@typescript-eslint/no-misused-promises",
          "@typescript-eslint/no-floating-promises",
        ]
      decision: own-antidrift
      whyThisState: "The ecosystem pair can catch async callbacks in some array APIs when broad void-return checks are enabled."
      whyNotOtherState: "Not equivalent because the needed option also reports real Express-style handlers, while the custom rule stays on array-method misuse."
    examples:
      flags:
        - "items.forEach(async (item) => await save(item));"
      allows:
        - "for (const item of items) await save(item);"
        - "await Promise.all(items.map(async (item) => save(item)));"
    nextAction: Find a second independent real drift instance, or document an explicit one-repo evidence exception before stable promotion.
  antidrift/no-cast-to-branded:
    status: under-proven
    stable: false
    signal: TypeChecker
    solveType: brand-forgery
    corpusRepositories: [codebase-atlas]
    concerns:
      - No real corpus currently adopts the antidrift brand kit.
      - Codebase Atlas has Zod-branded IDs and clean parse boundaries, but no real forged brand cast.
    external:
      state: broader-upstream
      support: high
      candidates: ["@typescript-eslint/no-unsafe-type-assertion"]
      decision: own-antidrift
      whyThisState: "The upstream assertion rule can report brand-forging casts, but only as part of a broad unsafe-assertion policy."
      whyNotOtherState: "Not equivalent because the intended contract is brand-specific: branded values must come from the brand constructor or validator."
    examples:
      flags:
        - "const id = raw as UserId;"
      allows:
        - "const id = UserId.make(raw);"
    nextAction: Wait for a real forged brand cast and decide whether Zod branded targets are in scope.
  antidrift/no-coupled-state-setters:
    status: ready
    stable: false
    signal: scope-binding
    solveType: react-state-shape
    corpusRepositories: [chaski]
    concerns:
      - Broad Chaski inventory has many findings and may need cleanup before wide enforcement.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported React rule was found that models multiple local state setters as one state-machine smell."
      whyNotOtherState: "Not partial-overlap because generic hooks rules do not reason about coupled setter bindings in one handler."
    examples:
      flags:
        - "onClick={() => { setData(data); setLoading(false); setError(null); }}"
      allows:
        - 'dispatch({ type: "loaded", data });'
    nextAction: Classify inventory findings before stable promotion.
  antidrift/no-defensive-shape-probing:
    status: ready
    stable: false
    signal: TypeChecker plus AST shape
    solveType: broad-value-shape-probing
    referenceDoc: docs/rule-investigations/no-defensive-shape-probing.md
    corpusRepositories: [chaski, sudocode-main, codebase-atlas]
    concerns:
      - Object.entries extractor branch has real Chaski drift evidence.
      - Boolean predicate helper branch was removed and remains separate research.
      - The rule now requires the entries value binding to be any/unknown before shape-probe counting matters.
      - Stable promotion still needs a second independent drift repository and broad inventory review.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported rule was found for Object.entries-style normalizers that repeatedly probe broad object shape."
      whyNotOtherState: "Not equivalent or partial-overlap because ordinary complexity and type-safety rules do not identify this construction pattern."
    examples:
      flags:
        - 'Object.entries(raw as Record<string, unknown>).map(([, value]) => "numberValue" in value ? value.numberValue : null)'
      allows:
        - "const parsed = schema.parse(raw);"
        - "Object.entries(typedMap).map(([id, value]) => value.name)"
    nextAction: Seek a second real drift repository before stable promotion.
  antidrift/no-hover-translate-card:
    status: ready
    stable: false
    signal: AST string literal extraction
    solveType: design-system-interaction
    corpusRepositories: [chaski, sudocode-main]
    concerns:
      - CSS @apply remains outside current JSX scope.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "A generated selector could ban hover translate tokens, but the custom extractor handles static class expressions more clearly."
      whyNotOtherState: "Not ecosystem-covered because the desired policy is design-system interaction guidance, not generic Tailwind validity."
    examples:
      flags:
        - 'className="card hover:-translate-y-0.5"'
      allows:
        - 'className="card hover:shadow-md"'
    nextAction: Stable promotion requires inventory classification across another UI repo.
  antidrift/no-inline-structural-type-at-use-site:
    status: ready
    stable: false
    signal: AST
    solveType: type-contract-shape
    corpusRepositories: [chaski]
    concerns:
      - Local UI props and callback payloads require careful exclusions.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "Core selectors can find inline type literals, but the custom rule narrows the violation to exported and boundary use sites."
      whyNotOtherState: "Not equivalent because a raw syntax ban would report legitimate local props, callbacks, and small internal shapes."
    examples:
      flags:
        - "export function load(input: { userId: string }) {}"
      allows:
        - "export function load(input: LoadInput) {}"
    nextAction: Seek independent repo replication before stable promotion.
  antidrift/no-nullable-positional-tuple:
    status: ready
    stable: false
    signal: deterministic AST
    solveType: type-contract-shape
    referenceDoc: docs/rule-investigations/no-nullable-positional-tuple.md
    corpusRepositories: [chaski]
    concerns:
      - The rule intentionally requires at least two nullable or optional tuple slots; one nullable slot in a hook-style tuple stays clean.
      - Type alias and generic-chain nullability are resolved only when TypeScript parser services are available.
      - Imported owner aliases such as date-picker range types stay outside the rule unless they are redeclared as local tuple syntax.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported rule was found for the narrower smell of positional tuples with multiple nullable or optional slots."
      whyNotOtherState: "Not equivalent to tuple bans because ordinary coordinate or hook-style tuples should remain clean."
    examples:
      flags:
        - "type CustomRange = [Date | null, Date | null];"
      allows:
        - "type Point = [number, number];"
    nextAction: Seek another real nullable positional tuple and clean tuple-control replication before stable promotion.
  antidrift/no-obvious-comment:
    status: ready
    stable: false
    signal: token-overlap
    solveType: review-noise
    corpusRepositories: [chaski]
    concerns:
      - Heuristic rule with many inventory findings.
    external:
      state: partial-overlap
      support: high
      candidates: ["ESLint no-warning-comments"]
      decision: own-antidrift
      whyThisState: "The ecosystem rule covers TODO/FIXME-style comments, which is nearby review-noise policy."
      whyNotOtherState: "Not equivalent because this rule targets comments that restate adjacent code rather than tagged warning comments."
    examples:
      flags:
        - "// Set count before setCount(count + 1);"
      allows:
        - "// Keep latest callback stable across renders."
    nextAction: Keep as lower-confidence until another repo inventory shows low false positives.
  antidrift/no-raw-fetch-in-component:
    status: ready
    stable: true
    signal: import-scope plus AST
    solveType: side-effect-boundary
    referenceDoc: docs/rule-investigations/no-raw-fetch-in-component.md
    corpusRepositories: [chaski, codebase-atlas, sudocode-main, murderbox]
    concerns:
      - Scope decision resolved on June 4, 2026; keep this rule fetch-specific and put broader raw transport ownership in a separate registry-backed rule if real non-fetch drift justifies it.
      - The rule models fetch, globalThis.fetch, window.fetch, and self.fetch. Aliased or destructured fetch is out of scope until real corpus evidence appears.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "A generated selector could ban fetch in broad file globs, but this rule narrows to component context."
      whyNotOtherState: "Not ecosystem-covered because the replacement would lose the component-boundary ambition and produce cruder reports."
    examples:
      flags:
        - 'function Orders() { fetch("/api/orders"); return null; }'
        - "async function loadImage(url) { return globalThis.fetch(url); }"
      allows:
        - 'async function loadOrders() { return fetch("/api/orders"); }'
        - "function Orders() { const { data } = useOrders(); return <div>{data.length}</div>; }"
    nextAction: Stable; monitor for real aliased/destructured fetch evidence and keep broader raw transport as a separate future rule.
  antidrift/no-raw-tailwind-color:
    status: ready
    stable: false
    signal: class-string
    solveType: design-token-drift
    corpusRepositories: [chaski]
    concerns:
      - Broad Chaski inventory has many findings and may need cleanup before wide enforcement.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "Generated selectors could ban raw class tokens, but the custom extractor is clearer for JSX class expressions."
      whyNotOtherState: "Not equivalent to Tailwind correctness plugins because the policy is semantic token ownership, not valid utility syntax."
    examples:
      flags:
        - 'className="text-red-500"'
      allows:
        - 'className="text-danger"'
    nextAction: Classify inventory findings before stable promotion.
  antidrift/no-redundant-zod-parse:
    status: ready
    stable: true
    referenceDoc: docs/rule-investigations/no-redundant-zod-parse.md
    signal: TypeChecker plus schema provenance
    solveType: validation-boundary-drift
    corpusRepositories: [chaski, codebase-atlas, murderbox]
    concerns:
      - "Test assertion scope is decided: Zod parses inside throw assertion callbacks are schema-contract checks, not validation-boundary drift."
      - "A June 4, 2026 real-test scan found no consumed assertion-callback reparse case across Codebase Atlas, Murderbox, Sudocode, and Chaski; that missing negative gate is accepted as unrepresented in the current corpus."
      - "Direct inline awaited and synchronous helper-result reparses are covered when TypeScript proves the helper result is equivalent to the schema output."
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported Zod rule was found that tracks schema provenance and reports re-parsing a value already produced by the same schema."
      whyNotOtherState: "Not partial-overlap because generic unsafe-assignment rules do not distinguish raw input from schema-owned output."
    examples:
      flags:
        - "const row = RowSchema.parse(await getTypedRow());"
      allows:
        - "const row = RowSchema.parse(raw);"
        - "expect(() => RowSchema.parse(typedFixture)).not.toThrow();"
    nextAction: Stable; monitor for first-boundary schema pipelines that need additional clean exclusions.
  antidrift/no-role-literal-in-type:
    status: under-proven
    stable: false
    signal: registry plus AST context
    solveType: domain-vocabulary-fork
    corpusRepositories: [chaski]
    concerns:
      - No real drift case has been accepted.
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "Generated selectors could match configured role literals, but the custom rule carries owner-file and type-context exceptions."
      whyNotOtherState: "Not ecosystem-covered because generic literal restrictions cannot explain the domain registry replacement."
    examples:
      flags:
        - "type Role = 'business-admin' | 'sales-manager';"
      allows:
        - 'import type { Roles } from "./api/types";'
    nextAction: Do not promote until a real role union redeclaration is found.
  antidrift/no-sql-string-concat:
    status: ready
    stable: false
    referenceDoc: docs/rule-investigations/no-sql-string-concat.md
    signal: AST string construction
    solveType: injection-boundary
    corpusRepositories: [chaski, codebase-atlas, sudocode-main, cloudflare-agents]
    concerns:
      - The benchmark on 190 real files reports 10 antidrift findings and 0 `sonarjs/sql-queries` findings, so SonarJS is not a replacement for the current HogQL/template interpolation signal.
      - Dynamic placeholder lists such as `ids.map(() => "?").join(",")` are accepted clean because values remain bound parameters.
      - Locally built static SQL fragment arrays joined into SET/WHERE clauses are accepted clean; arbitrary dynamic SQL fragments still report.
      - Parameterized SQL template tags such as `sql`, `sqlQuery`, and `sqlRun` are accepted clean because the tag owns value binding.
      - Closed SQL identifier fragments from typed service-boundary unions and static object-literal column maps are accepted only in SQL identifier/direction positions.
      - A widened local scan still has unresolved normal-string API findings around dynamic object-key column lists, non-allowlisted table names, and test/browser-evaluation SQL strings.
    external:
      state: partial-overlap
      support: medium
      candidates: ["sonarjs/sql-queries", "sql/no-unsafe-query"]
      decision: own-antidrift
      whyThisState: "Security plugins cover SQL construction in nearby ways, but the measured SonarJS benchmark did not report the real HogQL/template interpolation cases."
      whyNotOtherState: "Not equivalent because the real HoGQL interpolation case was not covered by the checked ecosystem path."
    examples:
      flags:
        - "const sql = `SELECT * FROM users WHERE id = ${id}`;"
        - 'const setClause = Object.keys(updates).map((field) => `${field} = ?`).join(", "); db.prepare(`UPDATE executions SET ${setClause} WHERE id = ?`);'
      allows:
        - 'db.query("SELECT * FROM users WHERE id = ?", [id]);'
        - 'const placeholders = ids.map(() => "?").join(","); db.prepare(`SELECT id FROM issues WHERE id IN (${placeholders})`).all(...ids);'
        - "await this.sqlRun`UPDATE files SET modified_at = ${timestamp} WHERE path = ${path}`;"
        - 'const sortBy = options.sortBy ?? "created_at"; db.prepare(`SELECT * FROM executions ORDER BY ${sortBy}`);'
    nextAction: Classify or remediate the remaining dynamic object-key column lists, non-allowlisted table names, and test/browser-evaluation SQL strings before promotion.
  antidrift/no-status-literal-in-type:
    status: ready
    stable: false
    signal: registry plus AST context
    solveType: domain-vocabulary-fork
    corpusRepositories: [chaski]
    concerns: []
    external:
      state: config-replacement
      support: high
      candidates: ["ESLint no-restricted-syntax"]
      decision: own-antidrift
      whyThisState: "Generated selectors could match configured status literals, but the custom rule carries owner-file and type-context exceptions."
      whyNotOtherState: "Not ecosystem-covered because generic literal restrictions cannot explain the domain registry replacement."
    examples:
      flags:
        - "type Status = 'active' | 'disabled';"
      allows:
        - 'import type { UserStatus } from "./domain";'
    nextAction: Seek independent status-fork replication before stable promotion.
  antidrift/no-status-triplet-state:
    status: ready
    stable: false
    signal: configurable name groups plus React state shape
    solveType: react-state-shape
    corpusRepositories: [chaski]
    concerns:
      - Heuristic by nature; stable promotion needs multiple low-noise inventories.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported React rule was found for configurable data/loading/error state triplets."
      whyNotOtherState: "Not partial-overlap because ordinary hooks rules do not identify the resource-state modeling smell."
    examples:
      flags:
        - "const [data] = useState(null); const [loading] = useState(false); const [error] = useState(null);"
      allows:
        - 'const [resource] = useState({ state: "loading" });'
    nextAction: Keep configurable and classify another frontend repo inventory.
  antidrift/no-structural-type-fork:
    status: ready
    stable: false
    signal: TypeChecker structural comparison plus generated registry
    solveType: type-fork
    corpusRepositories: [chaski]
    concerns:
      - Installed package fork drift still needs independent real-repo replication.
      - Generated-source matching is registry-gated and should stay off when no generated source is declared.
      - Boundary DTOs may intentionally overlap generated types and need real clean controls before broad enablement.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported rule was found that compares handwritten object types against installed package or generated-source exported types."
      whyNotOtherState: "Not equivalent to naming or import rules because the violation is structural type duplication proven by the TypeChecker."
    examples:
      flags:
        - "type AuthUser = { uid: string; email: string | null; displayName: string | null; photoURL: string | null; providerId: string; phoneNumber: string | null; };"
      allows:
        - 'import type { User } from "firebase/auth";'
    nextAction: Seek independent generated-source or installed-package fork replication before stable promotion.
  antidrift/no-canonical-model-fork:
    status: ready
    stable: false
    signal: TypeChecker plus domain registry
    solveType: domain-model-drift
    referenceDoc: docs/rule-investigations/domain-canonical-model-fork.md
    corpusRepositories: [chaski]
    concerns:
      - Requires explicit canonicalEntities registry entries; without a configured owner, the rule is inert.
      - Only exported canonical object types with at least four properties are candidates, so small helper shapes are intentionally ignored.
      - Schema-inferred DTO aliases stay clean because the rule only reports handwritten object type/interface declarations.
      - Boundary DTOs and view models can legitimately overlap, so stable promotion needs broader real-repo inventory.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported rule was found that knows repo-owned canonical model files and compares local redeclarations against those owner exports."
      whyNotOtherState: "Not covered by no-structural-type-fork because this is about first-party domain ownership, not installed packages or generated sources."
    examples:
      flags:
        - "type ActionItem = { title: string; status: Status; target: { value: number }; actual: { value: number; status: Status } };"
      allows:
        - 'import type { ActionItem } from "@portal/types/reports";'
    nextAction: Run another repo inventory with configured domain owners before stable promotion.
  antidrift/no-trivial-selector-wrapper:
    status: ready
    stable: false
    signal: AST structural return shape
    solveType: inference-appeasement
    referenceDoc: docs/rule-investigations/no-trivial-selector-wrapper.md
    corpusRepositories: [chaski, codebase-atlas]
    concerns:
      - Adapter callbacks such as key extractors can also be a single member return; the current convention is a local rule-specific disable with a required reason, not a prop-name/use-site heuristic.
      - Current adapter pressure is one strong Murderbox keyExtractor candidate, not repeated enough to justify a use-site-aware exemption.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported rule was found for helpers that only return a member of their own parameter to appease inference."
      whyNotOtherState: "Not covered by explicit-return rules because the actionable fix is to inline the property access, not only remove an annotation."
    examples:
      flags:
        - "function pickItems(bag: Bag): Item[] { return bag.items; }"
      allows:
        - "function totalItems(bag: Bag): number { return bag.items.length; }"
    nextAction: Keep structural; do not add a use-site-aware exemption until repeated adapter pressure appears in real repositories.
  antidrift/no-underchecked-type-predicate:
    status: ready
    stable: false
    signal: TypeChecker plus AST/control-flow checks
    solveType: type-guard-laundering
    referenceDoc: docs/rule-investigations/no-underchecked-type-predicate.md
    corpusRepositories: [chaski, codebase-atlas]
    concerns:
      - The rule is intentionally limited to broad-input predicates that assert nontrivial object contracts.
      - Codebase Atlas supplies clean controls for primitive predicates, alias-based field checks, and third-party union predicates.
      - Validator delegation is allowed, so stable promotion should classify schema-backed predicate inventories.
      - Discriminant guards over already-typed unions stay outside the report path.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported type-aware rule was found that checks whether a predicate body validates enough of the asserted object type."
      whyNotOtherState: "Not equivalent to discriminated-union exhaustiveness because this rule targets broad-input guard laundering."
    examples:
      flags:
        - 'const isUser = (value: unknown): value is User => value != null && typeof value === "object";'
      allows:
        - 'function isDateMessage(value: unknown): value is DateMessage { return !!value && typeof value === "object" && "year" in value && "month" in value && "day" in value; }'
    nextAction: Seek another broad-input underchecked predicate drift case before stable promotion.
  antidrift/no-unsafe-cast-chain:
    status: ready
    stable: false
    signal: AST cast chain
    solveType: type-escape-hatch
    corpusRepositories: [chaski]
    concerns: []
    external:
      state: broader-upstream
      support: high
      candidates: ["@typescript-eslint/no-unsafe-type-assertion"]
      decision: own-antidrift
      whyThisState: "The upstream rule catches the cast-chain drift but also owns a broader unsafe-assertion policy."
      whyNotOtherState: "Not equivalent because adopting the upstream rule directly produced unrelated assertion inventory noise in real code."
    examples:
      flags:
        - "const user = raw as unknown as User;"
      allows:
        - "const user = schema.parse(raw);"
    nextAction: Seek independent cast-tunnel replication before stable promotion.
  antidrift/no-unsafe-deserialize:
    status: ready
    stable: true
    signal: TypeChecker plus local string-boundary control flow
    solveType: parse-at-edge
    referenceDoc: docs/rule-investigations/no-unsafe-deserialize.md
    corpusRepositories:
      [chaski, codebase-atlas, sudocode-main, cloudflare-agents]
    concerns: []
    external:
      state: partial-overlap
      support: high
      candidates: ["@typescript-eslint/no-unsafe-argument"]
      decision: own-antidrift
      whyThisState: "The ecosystem rule can catch some any-to-JSON.parse argument flows."
      whyNotOtherState: "Not equivalent because the desired rule is specifically parse-at-edge guidance for broad JSON input and typed consumption."
    examples:
      flags:
        - "JSON.parse(row.source as any);"
        - "JSON.parse(row.config_json); // when row.config_json is checker-typed as any"
      allows:
        - "const value = JSON.parse(text);"
        - 'if (typeof event.data !== "string") return; JSON.parse(event.data);'
        - "const parsed = schema.parse(JSON.parse(text));"
