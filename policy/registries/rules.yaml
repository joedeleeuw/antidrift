      - Opencode has a real underchecked UI predicate candidate, but this checkout cannot type-check that package because @tsconfig/node22 is missing.
      - Validator delegation is allowed, so stable promotion should classify schema-backed predicate inventories.
      - Discriminant guards over already-typed unions stay outside the report path.
      - The verdict layer is heuristic; validator-looking helper names and incidental member reads can cause false negatives.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported type-aware rule was found that checks whether a predicate body validates enough of the asserted object type."
      whyNotOtherState: "Not equivalent to discriminated-union exhaustiveness because this rule targets broad-input guard laundering."
    examples:
      flags:
        - 'const isUser = (value: unknown): value is User => value != null && typeof value === "object";'
      allows:
        - 'function isDateMessage(value: unknown): value is DateMessage { return !!value && typeof value === "object" && "year" in value && "month" in value && "day" in value; }'
    nextAction: Seek another evaluable broad-input underchecked predicate drift case before stable promotion; recheck the Opencode UI candidate if that checkout has install-resolvable tsconfig dependencies.
  antidrift/no-unsafe-cast-chain:
    status: ready
    stable: false
    signal: AST cast chain
    solveType: type-escape-hatch
    corpusRepositories: [chaski]
    concerns: []
    external:
      state: broader-upstream
      support: high
      candidates: ["@typescript-eslint/no-unsafe-type-assertion"]
      decision: own-antidrift
      whyThisState: "The upstream rule catches the cast-chain drift but also owns a broader unsafe-assertion policy."
      whyNotOtherState: "Not equivalent because adopting the upstream rule directly produced unrelated assertion inventory noise in real code."
    examples:
      flags:
        - "const user = raw as unknown as User;"
      allows:
        - "const user = schema.parse(raw);"
    nextAction: Seek independent cast-tunnel replication before stable promotion.
  antidrift/no-unsafe-deserialize:
    status: ready
    stable: true
    signal: TypeChecker plus local string-boundary control flow
    solveType: parse-at-edge
    referenceDoc: docs/rule-investigations/no-unsafe-deserialize.md
    corpusRepositories: [chaski, codebase-atlas, sudocode-main, opencode]
    concerns:
      - Cloudflare Agents type-aware deserialize cases remain external-corpus inventory only because the checkout's tsconfigs extend agents/tsconfig without an install-resolvable package path.
      - Parse-output contract assertions such as JSON.parse(event.data as string) as OutgoingMessage are owned by antidrift/no-appeasement-cast, not this parse-input rule.
    external:
      state: partial-overlap
      support: high
      candidates: ["@typescript-eslint/no-unsafe-argument"]
      decision: own-antidrift
      whyThisState: "The ecosystem rule can catch some any-to-JSON.parse argument flows."
      whyNotOtherState: "Not equivalent because the desired rule is specifically parse-at-edge guidance for broad JSON input and typed consumption."
    examples:
      flags:
        - "JSON.parse(row.source as any);"
        - "JSON.parse(row.config_json); // when row.config_json is checker-typed as any"
      allows:
        - "const value = JSON.parse(text);"
        - 'if (typeof event.data !== "string") return; JSON.parse(event.data);'
        - "const parsed = schema.parse(JSON.parse(text));"
    nextAction: Stable; monitor for real aliased JSON.parse calls or helper-based string guards before widening.
  antidrift/require-authz-check:
    status: ready
    stable: false
    signal: AST control-flow plus registry
    solveType: authorization-boundary
    corpusRepositories: [chaski, sudocode-main]
    concerns:
      - Current rule is Express-style and does not prove tRPC procedure coverage.
    external:
      state: net-antidrift
      support: none
      candidates: []
      decision: own-antidrift
      whyThisState: "No supported rule was found for repo-configured authz calls in boundary handlers that read request parameters."
      whyNotOtherState: "Not equivalent to route or security plugins because the required calls are registry-owned project policy."
    examples:
      flags:
        - 'app.get("/users/:id", (req) => read(req.params.id));'
      allows:
        - 'app.get("/users/:id", (req) => { requireUser(req); read(req.params.id); });'
    nextAction: Broadened Sudocode route coverage now proves the handler-local Express shape; decide middleware-aware Express dominance and tRPC procedure authorization as separate scoped rules before stable promotion.
  antidrift/require-effect-deps:
    status: ready
    stable: true
    signal: import binding plus AST
    solveType: react-effect-lifecycle
    referenceDoc: docs/rule-investigations/require-effect-deps.md
    corpusRepositories:
      [chaski, codebase-atlas, sudocode-main, murderbox, claude-code-source]
    concerns:
      - Intentional every-render effects use a local `antidrift/require-effect-deps` disable with a required reason; this convention is accepted as policy-backed by `@eslint-community/eslint-comments/require-description`.
      - The exact ecosystem overlap is `eslint-plugin-use-effect-no-deps`, but it is a small single-purpose package and not a strong replacement for the custom rule.
    external:
      state: partial-overlap
      support: high
      candidates:
        [
          "react-hooks/exhaustive-deps",
          "eslint-plugin-use-effect-no-deps",
          "@eslint-react/hooks-extra/no-direct-set-state-in-use-effect",
          "react-hooks-extra/no-direct-set-state-in-use-effect",
        ]
      decision: own-antidrift
      whyThisState: "React Hooks exhaustive-deps owns dependency-array correctness once an array exists, the React Compiler/ESLint React ecosystem owns adjacent effect smells, and a small plugin covers missing arrays."
      whyNotOtherState: "Not equivalent because exhaustive-deps intentionally stays silent on the no-array case, adjacent effect rules target different smells, and the one-purpose no-deps plugin is not a strong maintained replacement."
    examples:
      flags:
        - "useEffect(() => sync());"
      allows:
        - "useEffect(() => sync(), [sync]);"
    nextAction: Stable; monitor real consumers of the rule-specific every-render disable convention and revisit only if the directive burden proves noisy.

retiredRules:
