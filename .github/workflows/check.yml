name: Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm policy:check-generated
      - run: pnpm check
      - run: pnpm sonar:prepare
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: policy-reports
          path: reports
