id: sonar-way-plus-ai
extends: Sonar way # Extending keeps future default Sonar rule updates.
languages:
  - JavaScript
  - TypeScript
selectionPolicy:
  baseline: Use the built-in Sonar way JavaScript and TypeScript profiles as the parent.
  agenticProfileNote: As of 2026-06-08, Sonar's public Sonar agentic AI JS/TS profile is a subset of Sonar way, not a superset. Do not switch to it unless the profile diff is reviewed.
  externalIssues: antidrift custom rules are imported through sonar.externalIssuesReportPaths; they do not belong in the Sonar quality profile.
prioritizedRuleFamilies:
  - id: complexity
    comment: Agent code often passes tests while becoming hard to understand.
    representativeRules:
      - typescript:S3776 # Cognitive Complexity of functions should not be too high.
      - javascript:S3776
      - typescript:S4144 # Functions should not have identical implementations.
      - javascript:S4144
  - id: duplication
    comment: Agents copy nearby code and mutate it slightly.
    representativeRules:
      - typescript:S4144 # Functions should not have identical implementations.
      - javascript:S4144
      - typescript:S3516 # Function returns should not be invariant.
      - javascript:S3516
  - id: control-flow-correctness
    comment: Plausible generated code often has small branch/callback mistakes.
    representativeRules:
      - typescript:S1143 # Jump statements should not occur in finally blocks.
      - typescript:S128 # Switch cases should end with an unconditional break.
      - typescript:S1764 # Identical expressions should not be used on both sides of a binary operator.
      - typescript:S1862 # Branch chains should not repeat the same condition.
      - typescript:S2871 # Array sort calls should use a compare function.
      - typescript:S4123 # Await should only be used with promises.
      - typescript:S4822 # Promise rejections should not be caught by try blocks.
      - typescript:S6544 # Promises should not be misused.
      - javascript:S1143
      - javascript:S128
      - javascript:S1764
      - javascript:S1862
      - javascript:S2871
      - javascript:S4123
      - javascript:S4822
      - javascript:S6544
  - id: security-injection
    comment: Generated snippets need strict unsafe API detection.
    representativeRules:
      - tssecurity:S8701 # Agentic workflows should not be vulnerable to command injection.
      - tssecurity:S8702 # Agentic workflows should not be vulnerable to SQL injection.
      - tssecurity:S8704 # Agentic workflows should not be vulnerable to code injection.
      - tssecurity:S8705 # Agentic workflows should not be vulnerable to argument injection.
      - tssecurity:S8706 # Agentic workflows should not be vulnerable to connection string injection.
      - tssecurity:S8707 # Agentic workflows should not be vulnerable to path injection.
      - tssecurity:S2076 # OS command injection.
      - tssecurity:S3649 # Database query injection.
      - tssecurity:S5131 # Reflected XSS.
      - tssecurity:S5144 # SSRF.
      - tssecurity:S5334 # Dynamic code execution injection.
      - tssecurity:S6109 # Prototype pollution.
      - jssecurity:S8701
      - jssecurity:S8702
      - jssecurity:S8704
      - jssecurity:S8705
      - jssecurity:S8706
      - jssecurity:S8707
      - jssecurity:S2076
      - jssecurity:S3649
      - jssecurity:S5131
      - jssecurity:S5144
      - jssecurity:S5334
      - jssecurity:S6109
  - id: secrets-crypto-and-http
    comment: Sonar should own maintained security hotspot and vulnerability coverage that is broader than local AST rules.
    representativeRules:
      - typescript:S6418 # Secrets should not be hard-coded.
      - typescript:S2068 # Credentials should not be hard-coded.
      - typescript:S2245 # PRNGs should not be used in security contexts.
      - typescript:S2755 # XML parsers should not be vulnerable to XXE attacks.
      - typescript:S3330 # Cookies should have the HttpOnly flag.
      - typescript:S4502 # CSRF protections should not be disabled.
      - typescript:S4830 # Server certificates should be verified.
      - typescript:S5122 # CORS policy should be restricted to trusted origins.
      - typescript:S5332 # Clear-text protocols are security-sensitive.
      - typescript:S5547 # Cipher algorithms should be robust.
      - typescript:S5659 # JWT should be signed and verified with strong algorithms.
      - javascript:S6418
      - javascript:S2068
      - javascript:S2245
      - javascript:S2755
      - javascript:S3330
      - javascript:S4502
      - javascript:S4830
      - javascript:S5122
      - javascript:S5332
      - javascript:S5547
      - javascript:S5659
  - id: test-integrity
    comment: Generated tests often lack meaningful assertions.
    representativeRules:
      - typescript:S1607 # Tests should not be skipped without providing a reason.
      - typescript:S2187 # Test files should contain at least one test case.
      - typescript:S2699 # Tests should include assertions.
      - typescript:S2970 # Assertions should be complete.
      - typescript:S5906 # The most specific assertion should be used.
      - typescript:S5914 # Assertions should not fail or succeed unconditionally.
      - typescript:S5958 # Tests should check which exception is thrown.
      - typescript:S5973 # Tests should be stable.
      - typescript:S6426 # Exclusive tests should not be committed.
      - javascript:S1607
      - javascript:S2187
      - javascript:S2699
      - javascript:S2970
      - javascript:S5906
      - javascript:S5914
      - javascript:S5958
      - javascript:S5973
      - javascript:S6426
  - id: accessibility
    comment: UI agents omit accessibility unless enforced.
    representativeRules:
      - typescript:S1082 # Mouse events should have corresponding keyboard events.
      - typescript:S1090 # iFrames must have a title.
      - typescript:S4084 # Media elements should have captions.
      - typescript:S6793 # ARIA properties should have valid values.
      - typescript:S6807 # ARIA roles should have required properties.
      - typescript:S6821 # ARIA roles should be valid non-abstract roles.
      - typescript:S6822 # Redundant ARIA roles should be removed.
      - typescript:S6841 # tabIndex values should be 0 or -1.
      - typescript:S6844 # Anchor tags should not be used as buttons.
      - typescript:S6853 # Labels should have text and an associated control.
      - javascript:S1082
      - javascript:S1090
      - javascript:S4084
      - javascript:S6793
      - javascript:S6807
      - javascript:S6821
      - javascript:S6822
      - javascript:S6841
      - javascript:S6844
      - javascript:S6853
  - id: react-correctness
    comment: Sonar should complement react-hooks and React compiler lint with portfolio-visible UI correctness issues.
    representativeRules:
      - typescript:S6439 # React components should not render non-boolean condition values.
      - typescript:S6440 # React Hooks should be properly called.
      - typescript:S6442 # useState setter should not be called in render/body.
      - typescript:S6443 # State setter should not be called with its matching state variable.
      - typescript:S6477 # JSX list components should have a key property.
      - typescript:S6479 # JSX list components should not use array indexes as key.
      - typescript:S6481 # React Context Provider values should have stable identities.
      - typescript:S6754 # useState return value should be destructured and named symmetrically.
      - typescript:S6756 # setState should use callback when referencing previous state.
      - typescript:S6759 # React props should be read-only.
      - javascript:S6439
      - javascript:S6440
      - javascript:S6442
      - javascript:S6443
      - javascript:S6477
      - javascript:S6479
      - javascript:S6481
      - javascript:S6754
      - javascript:S6756
      - javascript:S6759
  - id: typescript-type-hygiene
    comment: Sonar should catch maintained type-system hygiene that is not antidrift-specific.
    representativeRules:
      - typescript:S4325 # Redundant casts and non-null assertions should be avoided.
      - typescript:S4335 # Type intersections should use meaningful types.
      - typescript:S4621 # Union/intersection types should not include duplicated constituents.
      - typescript:S4782 # Optional properties should not use both ? and undefined.
      - typescript:S6564 # Redundant type aliases should not be used.
      - typescript:S6568 # Non-null assertions should not be used misleadingly.
      - typescript:S6571 # Type constituents should not be redundant.
      - typescript:S6590 # as const assertions should be preferred.
  - id: external-antidrift
    comment: Repo-specific agent failures must appear beside native Sonar issues.
