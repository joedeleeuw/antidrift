sonar.projectKey=agent-guardrails-template
sonar.projectName=Agent Guardrails Template

# Disable native language sensors for this TypeScript monorepo template.
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

sonar.sources=apps,packages,tooling
sonar.tests=apps,packages,tooling
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/dist/**,**/coverage/**,**/node_modules/**,reports/**,**/*.pb.ts,**/*.pb.js,**/gen/**,**/generated/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.externalIssuesReportPaths=reports/antidrift-sonar.json
sonar.sourceEncoding=UTF-8
